<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ENCIDE · Event Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #080c14;
  --surface: #0d1420;
  --card: #111827;
  --border: #1e2d45;
  --accent: #00d4ff;
  --accent2: #7c3aed;
  --accent3: #f59e0b;
  --green: #10b981;
  --red: #ef4444;
  --text: #e2e8f0;
  --muted: #64748b;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-display);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

header {
  position: relative;
  z-index: 10;
  padding: 36px 40px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 16px;
}

.logo { display: flex; align-items: baseline; gap: 12px; }

.logo-name {
  font-size: 2rem;
  font-weight: 800;
  letter-spacing: -1px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.logo-sub {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--muted);
  letter-spacing: 3px;
  text-transform: uppercase;
}

.header-stats { display: flex; gap: 24px; flex-wrap: wrap; }
.stat { text-align: center; }

.stat-num {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--accent);
}

.stat-label {
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
}

.exam-banner {
  position: relative;
  z-index: 10;
  margin: 24px 40px;
  background: linear-gradient(135deg, rgba(124,58,237,0.15), rgba(0,212,255,0.08));
  border: 1px solid rgba(124,58,237,0.3);
  border-radius: 12px;
  padding: 18px 24px;
}

.exam-banner h3 {
  font-family: var(--font-mono);
  font-size: 0.7rem;
  color: var(--accent2);
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

.exam-grid { display: flex; gap: 32px; flex-wrap: wrap; }
.exam-item { display: flex; align-items: center; gap: 10px; }
.exam-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.exam-text { font-size: 0.82rem; color: var(--text); }
.exam-text span { font-family: var(--font-mono); color: var(--accent3); font-size: 0.75rem; }

.main {
  position: relative;
  z-index: 10;
  display: grid;
  grid-template-columns: 380px 1fr;
  gap: 0;
  min-height: calc(100vh - 180px);
}

.sidebar {
  padding: 28px;
  border-right: 1px solid var(--border);
  position: sticky;
  top: 0;
  height: fit-content;
}

.sidebar h2 {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 20px;
}

.form-group { margin-bottom: 16px; }

.form-group label {
  display: block;
  font-size: 0.72rem;
  font-family: var(--font-mono);
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 7px;
}

.form-group input,
.form-group textarea,
.form-group select {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 11px 14px;
  border-radius: 8px;
  font-family: var(--font-display);
  font-size: 0.88rem;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
  appearance: none;
}

.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,212,255,0.1);
}

.form-group textarea { resize: vertical; min-height: 80px; }

.tag-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.tag-option { display: none; }

.tag-option + label {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px;
  border-radius: 7px;
  border: 1px solid var(--border);
  font-size: 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
  color: var(--muted);
  background: var(--card);
}

.tag-option:checked + label {
  border-color: var(--accent);
  background: rgba(0,212,255,0.1);
  color: var(--accent);
}

.btn-save {
  width: 100%;
  padding: 13px;
  background: linear-gradient(135deg, var(--accent), #0099cc);
  border: none;
  color: #000;
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 0.9rem;
  border-radius: 9px;
  cursor: pointer;
  transition: opacity 0.2s, transform 0.1s;
  letter-spacing: 0.5px;
  margin-top: 8px;
}

.btn-save:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-save:active { transform: translateY(0); }
.btn-save:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.btn-cancel {
  width: 100%;
  padding: 10px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  font-family: var(--font-display);
  font-size: 0.82rem;
  border-radius: 9px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 8px;
  display: none;
}

.btn-cancel:hover { border-color: var(--red); color: var(--red); }

.timeline-panel { padding: 28px 36px; }

.timeline-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}

.timeline-header h2 {
  font-size: 0.65rem;
  font-family: var(--font-mono);
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}

.filter-tabs {
  display: flex;
  gap: 4px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 4px;
}

.filter-tab {
  padding: 6px 14px;
  border-radius: 5px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 1px;
}

.filter-tab.active { background: var(--accent); color: #000; font-weight: 700; }

.phase-label {
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 28px 0 14px;
}

.phase-label-text {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 2px;
  white-space: nowrap;
}

.phase-line { flex: 1; height: 1px; background: var(--border); }

.phase-badge {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  background: rgba(0,212,255,0.12);
  color: var(--accent);
  border: 1px solid rgba(0,212,255,0.25);
}

.events-list { display: flex; flex-direction: column; gap: 12px; }

.event-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  display: grid;
  grid-template-columns: 64px 1fr auto;
  gap: 16px;
  align-items: start;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
  overflow: hidden;
}

.event-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
}

.event-card.done-card { opacity: 0.65; }
.event-card.done-card::before { background: var(--green); }
.event-card:hover { border-color: rgba(0,212,255,0.3); transform: translateX(3px); }

.event-date-box {
  text-align: center;
  background: var(--surface);
  border-radius: 8px;
  padding: 8px 4px;
  border: 1px solid var(--border);
}

.event-day {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 700;
  line-height: 1;
  color: var(--accent);
}

.event-month {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-top: 3px;
}

.event-title { font-size: 1rem; font-weight: 700; margin-bottom: 5px; }
.event-desc  { font-size: 0.8rem; color: var(--muted); line-height: 1.5; margin-bottom: 10px; }
.event-tags  { display: flex; flex-wrap: wrap; gap: 6px; }

.event-tag {
  font-family: var(--font-mono);
  font-size: 0.6rem;
  padding: 2px 9px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── type colours — all five types covered ── */
.tag-workshop  { background: rgba(0,212,255,0.12);  color: #00d4ff; }
.tag-hackathon { background: rgba(124,58,237,0.15); color: #a78bfa; }
.tag-contest   { background: rgba(236,72,153,0.12); color: #f472b6; }
.tag-collab    { background: rgba(239,68,68,0.12);  color: #f87171; }
.tag-others    { background: rgba(16,185,129,0.12); color: #10b981; }

.done-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

.done-row input[type="checkbox"] {
  width: 16px;
  height: 16px;
  accent-color: var(--green);
  cursor: pointer;
}

.done-row label {
  font-size: 0.78rem;
  color: var(--muted);
  cursor: pointer;
  user-select: none;
}

.event-actions { display: flex; flex-direction: column; gap: 6px; }

.btn-edit, .btn-del {
  padding: 6px 12px;
  border-radius: 6px;
  border: 1px solid;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}

.btn-edit { background: transparent; border-color: var(--border); color: var(--muted); }
.btn-edit:hover { border-color: var(--accent); color: var(--accent); }
.btn-del  { background: transparent; border-color: transparent; color: var(--muted); }
.btn-del:hover  { border-color: var(--red); color: var(--red); }

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
}

.empty { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-icon { font-size: 3rem; margin-bottom: 16px; opacity: 0.3; }

.loading-msg {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 0.8rem;
  letter-spacing: 2px;
}

@media (max-width: 860px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { border-right: none; border-bottom: 1px solid var(--border); position: static; }
  header { padding: 20px; }
  .exam-banner { margin: 16px 20px; }
  .timeline-panel { padding: 20px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-name">ENCIDE</span>
    <span class="logo-sub">// Event Planner</span>
  </div>
  <div class="header-stats">
    <div class="stat"><div class="stat-num" id="stat-total">—</div><div class="stat-label">Events</div></div>
    <div class="stat"><div class="stat-num" id="stat-upcoming">—</div><div class="stat-label">Upcoming</div></div>
    <div class="stat"><div class="stat-num" id="stat-done">—</div><div class="stat-label">Done</div></div>
  </div>
</header>

<div class="exam-banner">
  <h3>// Exam Calendar — Blackout Zones</h3>
  <div class="exam-grid">
    <div class="exam-item">
      <div class="exam-dot" style="background:#a78bfa"></div>
      <div class="exam-text">3rd Year &nbsp;<span>Apr 24 → May 25</span></div>
    </div>
    <div class="exam-item">
      <div class="exam-dot" style="background:#f59e0b"></div>
      <div class="exam-text">2nd Year &nbsp;<span>Apr 28 → May 13</span></div>
    </div>
    <div class="exam-item">
      <div class="exam-dot" style="background:#10b981"></div>
      <div class="exam-text">1st Year &nbsp;<span>ends May 15</span></div>
    </div>
    <div class="exam-item">
      <div class="exam-dot" style="background:#00d4ff"></div>
      <div class="exam-text">Sem Break &nbsp;<span>Late May → Mid June</span></div>
    </div>
  </div>
</div>

<div class="main">

  <!-- SIDEBAR FORM -->
  <div class="sidebar">
    <h2>// Add / Edit Event</h2>

    <div class="form-group">
      <label>Event Title</label>
      <input type="text" id="inp-title" placeholder="e.g. Intro to Git Workshop">
    </div>

    <div class="form-group">
      <label>Date</label>
      <input type="date" id="inp-date">
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea id="inp-desc" placeholder="What's the event about? Who should attend?"></textarea>
    </div>

    <div class="form-group">
      <label>Event Type</label>
      <div class="tag-grid">
        <input type="radio" name="etype" id="t-workshop"  value="workshop"  class="tag-option" checked>
        <label for="t-workshop">🛠 Workshop</label>

        <input type="radio" name="etype" id="t-hackathon" value="hackathon" class="tag-option">
        <label for="t-hackathon">💻 Hackathon</label>

        <input type="radio" name="etype" id="t-contest"   value="contest"   class="tag-option">
        <label for="t-contest">🏆 Competition</label>

        <input type="radio" name="etype" id="t-collab"    value="collab"    class="tag-option">
        <label for="t-collab">🤝 Collab</label>

        <input type="radio" name="etype" id="t-others"    value="others"    class="tag-option">
        <label for="t-others">⚙️ Others</label>
      </div>
    </div>

    <div class="form-group">
      <label>Status</label>
      <select id="inp-status">
        <option value="not_planned">🔘 Not Planned</option>
        <option value="planned" selected>📋 Planned</option>
        <option value="confirmed">✅ Confirmed</option>
        <option value="cancelled">❌ Cancelled</option>
      </select>
    </div>

    <button class="btn-save" id="btn-save" onclick="saveEvent()">Save Event</button>
    <button class="btn-cancel" id="btn-cancel" onclick="cancelEdit()">Cancel Edit</button>
  </div>

  <!-- TIMELINE -->
  <div class="timeline-panel">
    <div class="timeline-header">
      <h2>// Event Timeline</h2>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
        <button class="filter-tab" onclick="setFilter('upcoming', this)">Upcoming</button>
        <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
      </div>
    </div>
    <div class="events-list" id="events-list">
      <div class="loading-msg">⟳ &nbsp;Loading events…</div>
    </div>
  </div>
</div>

<script>
const SHEETDB_API = "https://sheetdb.io/api/v1/4yirtp7b26t1a";

let events = [];
let editIdx = -1;
let currentFilter = 'all';

// ── Helpers ────────────────────────────────────────────────────────
function generateId() {
  return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
}

function fmtDate(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return {
    day:   d.getDate(),
    month: d.toLocaleString('default', { month: 'short' }).toUpperCase()
  };
}

function getMonthKey(dateStr) { return dateStr.slice(0, 7); }

function monthLabel(key) {
  const [y, m] = key.split('-');
  return new Date(`${y}-${m}-01T00:00:00`)
           .toLocaleString('default', { month: 'long' }) + ' ' + y;
}

function statusColor(s) {
  return { not_planned:'#f59e0b', planned:'#94a3b8',
           confirmed:'#10b981', done:'#00d4ff', cancelled:'#ef4444' }[s] || '#94a3b8';
}

function typeIcon(t) {
  return { workshop:'🛠', hackathon:'💻', contest:'🏆', collab:'🤝', others:'⚙️' }[t] || '📌';
}

// ── SheetDB ────────────────────────────────────────────────────────

async function fetchEvents() {
  try {
    const res = await fetch(SHEETDB_API);
    if (!res.ok) throw new Error("HTTP " + res.status);
    events = await res.json();
    if (!Array.isArray(events)) events = [];
  } catch (e) {
    console.error("fetchEvents:", e);
    events = [];
  }
  render();
}

async function addEventToSheetDB(ev) {
  // SheetDB POST: { data: [ rowObject ] }
  const res = await fetch(SHEETDB_API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: [ev] })
  });
  if (!res.ok) throw new Error("POST " + res.status);
}

async function updateEventInSheetDB(id, fields) {
  // SheetDB PATCH by column 'id': { data: { field: val } }
  const res = await fetch(`${SHEETDB_API}/id/${encodeURIComponent(id)}`, {
    method: "PATCH",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ data: fields })
  });
  if (!res.ok) throw new Error("PATCH " + res.status);
}

async function deleteEventFromSheetDB(id) {
  const res = await fetch(`${SHEETDB_API}/id/${encodeURIComponent(id)}`, {
    method: "DELETE"
  });
  if (!res.ok) throw new Error("DELETE " + res.status);
}

// ── Render ─────────────────────────────────────────────────────────
function render() {
  const list  = document.getElementById("events-list");
  const today = new Date(); today.setHours(0,0,0,0);

  let filtered = [...events].sort((a,b) => new Date(a.date) - new Date(b.date));

  if (currentFilter === 'upcoming')
    filtered = filtered.filter(e => new Date(e.date) >= today
                                 && e.status !== 'done' && e.status !== 'cancelled');
  if (currentFilter === 'done')
    filtered = filtered.filter(e => e.status === 'done');

  list.innerHTML = "";

  if (!filtered.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>No events here.</p></div>`;
    updateStats(); return;
  }

  let lastMonth = null;

  filtered.forEach(ev => {
    const realIdx  = events.findIndex(e => e.id === ev.id);
    const monthKey = getMonthKey(ev.date);

    if (monthKey !== lastMonth) {
      lastMonth = monthKey;
      const sep = document.createElement("div");
      sep.className = "phase-label";
      sep.innerHTML = `<span class="phase-line"></span>
                       <span class="phase-label-text">${monthLabel(monthKey)}</span>
                       <span class="phase-line"></span>`;
      list.appendChild(sep);
    }

    const { day, month } = fmtDate(ev.date);
    const isDone  = ev.status === 'done';
    const evType  = ev.type || 'others';
    const evStatus = ev.status || 'planned';

    const card = document.createElement("div");
    card.className = `event-card${isDone ? ' done-card' : ''}`;

    card.innerHTML = `
      <div class="event-date-box">
        <div class="event-day">${day}</div>
        <div class="event-month">${month}</div>
      </div>
      <div class="event-body">
        <div class="event-title">${ev.title}</div>
        <div class="event-desc">${ev.desc || ''}</div>
        <div class="event-tags">
          <span class="event-tag tag-${evType}">${typeIcon(evType)} ${evType}</span>
          <span class="event-tag" style="
            background:${statusColor(evStatus)}22;
            color:${statusColor(evStatus)};
            border:1px solid ${statusColor(evStatus)}44">
            <span class="status-dot" style="background:${statusColor(evStatus)}"></span>
            ${evStatus}
          </span>
        </div>
        <div class="done-row">
          <input type="checkbox" id="cb-${ev.id}"
            ${isDone ? 'checked' : ''}
            onchange="toggleDone('${ev.id}', this.checked)">
          <label for="cb-${ev.id}">Mark as Done 🎉</label>
        </div>
      </div>
      <div class="event-actions">
        <button class="btn-edit" onclick="startEdit(${realIdx})">Edit</button>
        <button class="btn-del"  onclick="deleteEvent('${ev.id}')">Delete</button>
      </div>`;

    list.appendChild(card);
  });

  updateStats();
}

function updateStats() {
  const today = new Date(); today.setHours(0,0,0,0);
  document.getElementById("stat-total").textContent    = events.length;
  document.getElementById("stat-upcoming").textContent = events.filter(e =>
    new Date(e.date) >= today && e.status !== 'cancelled' && e.status !== 'done').length;
  document.getElementById("stat-done").textContent     = events.filter(e => e.status === 'done').length;
}

// ── Filter ─────────────────────────────────────────────────────────
function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

// ── Mark as Done ───────────────────────────────────────────────────
// KEY FIX: update local array first → re-render immediately → then sync to SheetDB
async function toggleDone(id, checked) {
  const idx = events.findIndex(e => e.id === id);
  if (idx === -1) return;

  // 1. Mutate local state immediately
  events[idx] = { ...events[idx], status: checked ? 'done' : 'planned' };

  // 2. Re-render right away (no waiting for network)
  render();

  // 3. Auto-switch to Done tab when checking
  if (checked) {
    const doneTab = [...document.querySelectorAll('.filter-tab')]
                      .find(b => b.textContent.trim() === 'Done');
    if (doneTab) setFilter('done', doneTab);
  }

  // 4. Sync to SheetDB in background
  try {
    await updateEventInSheetDB(id, { status: checked ? 'done' : 'planned' });
  } catch (e) {
    console.error("Sync error:", e);
    // Revert local state on failure
    events[idx] = { ...events[idx], status: checked ? 'planned' : 'done' };
    render();
    alert("Could not sync status to sheet. Check console.");
  }
}

// ── Save ───────────────────────────────────────────────────────────
async function saveEvent() {
  const title  = document.getElementById("inp-title").value.trim();
  const date   = document.getElementById("inp-date").value;
  const desc   = document.getElementById("inp-desc").value.trim();
  const type   = document.querySelector('input[name="etype"]:checked')?.value || 'others';
  const status = document.getElementById("inp-status").value;

  if (!title || !date) { alert("Title and Date are required!"); return; }

  const btn = document.getElementById("btn-save");
  btn.disabled = true; btn.textContent = "Saving…";

  try {
    if (editIdx === -1) {
      const ev = { id: generateId(), title, date, desc, type, status };
      await addEventToSheetDB(ev);
    } else {
      const existingId = events[editIdx].id;
      // Send full row on update so all columns are refreshed
      await updateEventInSheetDB(existingId, { id: existingId, title, date, desc, type, status });
      editIdx = -1;
      document.getElementById("btn-cancel").style.display = "none";
    }
  } catch(e) {
    console.error("saveEvent:", e);
    alert("Could not save. Check console.");
  }

  btn.disabled = false; btn.textContent = "Save Event";
  clearForm();
  await fetchEvents();   // refresh from SheetDB
}

function clearForm() {
  document.getElementById("inp-title").value = "";
  document.getElementById("inp-date").value  = "";
  document.getElementById("inp-desc").value  = "";
  const ws = document.querySelector('input[name="etype"][value="workshop"]');
  if (ws) ws.checked = true;
  document.getElementById("inp-status").value = "planned";
}

// ── Edit ───────────────────────────────────────────────────────────
function startEdit(idx) {
  const ev = events[idx];
  document.getElementById("inp-title").value = ev.title  || '';
  document.getElementById("inp-date").value  = ev.date   || '';
  document.getElementById("inp-desc").value  = ev.desc   || '';

  const radio = document.querySelector(`input[name="etype"][value="${ev.type || 'others'}"]`);
  if (radio) radio.checked = true;

  // 'done' is toggled by checkbox only — don't show it in status dropdown
  document.getElementById("inp-status").value =
    (ev.status === 'done') ? 'planned' : (ev.status || 'planned');

  editIdx = idx;
  document.getElementById("btn-cancel").style.display = "block";
  document.querySelector('.sidebar').scrollIntoView({ behavior: 'smooth' });
}

function cancelEdit() {
  editIdx = -1; clearForm();
  document.getElementById("btn-cancel").style.display = "none";
}

// ── Delete ─────────────────────────────────────────────────────────
async function deleteEvent(id) {
  const ev = events.find(e => e.id === id);
  if (!ev || !confirm(`Delete "${ev.title}"?`)) return;

  events = events.filter(e => e.id !== id);   // remove locally first
  render();

  try {
    await deleteEventFromSheetDB(id);
  } catch(e) {
    console.error("deleteEvent:", e);
    await fetchEvents();   // resync on error
  }
}

// ── Init ───────────────────────────────────────────────────────────
fetchEvents();
</script>
</body>
